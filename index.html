<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Wraith | The Agency Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --obsidian: #0a0c10; --border: rgba(255,255,255,0.06); }
        body { background-color: var(--obsidian); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; cursor: none; }
        
        /* FIXED HERO IMAGE: Using the direct link provided */
        .hero-bg-img {
            position: absolute;
            inset: 0;
            background-image: url('https://kommodo.ai/i/jx3zCrPDLiLyEU5gjkyN');
            background-size: cover;
            background-position: center 25%;
            background-repeat: no-repeat;
            z-index: 0;
            transform: scale(1.05);
        }

        .cursor, .cursor-ring { pointer-events: none; position: fixed; z-index: 9999; border-radius: 50%; transform: translate(-50%, -50%); }
        .cursor { width: 8px; height: 8px; background: var(--gold); }
        .cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(212,175,55,0.5); }
        
        .hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; overflow: hidden; }
        .hero-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,12,16,0.2) 0%, rgba(10,12,16,1) 100%); z-index: 1; }
        .hero-content { position: relative; z-index: 2; max-width: 900px; }
        .hero-title { font-size: clamp(5rem, 14vw, 11rem); font-weight: 900; font-style: italic; line-height: 0.85; margin-bottom: 2rem; }
        
        .btn-hero-download { display: inline-flex; align-items: center; gap: 1rem; padding: 1.4rem 4rem; background: linear-gradient(135deg, #b8860b, #ffd700); color: #000; font-weight: 900; text-transform: uppercase; text-decoration: none; box-shadow: 0 0 60px rgba(212,175,55,0.35); transition: 0.3s; }
        .btn-hero-download:hover { transform: translateY(-4px); box-shadow: 0 25px 60px rgba(212,175,55,0.5); }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <section class="hero" id="home">
        <div class="hero-bg-img" id="heroBg"></div>
        <div class="hero-gradient"></div>

        <div class="hero-content">
            <h1 class="hero-title">PROJECT WRAITH</h1>
            <a href="https://cdn.cbn.lol/12.41" class="btn-hero-download">Download Build v12.41</a>
        </div>
    </section>

    <script>
        // Cursor Follow
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursorRing');
        document.addEventListener('mousemove', e => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.08 });
            gsap.to(ring, { x: e.clientX, y: e.clientY, duration: 0.25 });
        });
    </script>
</body>
</html>
